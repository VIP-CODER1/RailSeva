<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Train body -->
  <rect x="10" y="30" width="80" height="40" rx="8" fill="#FF4500" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Train front section -->
  <rect x="15" y="20" width="70" height="20" rx="6" fill="#FFD700" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Windows -->
  <rect x="25" y="25" width="15" height="12" fill="#1E90FF" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="45" y="25" width="15" height="12" fill="#1E90FF" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="65" y="25" width="10" height="12" fill="#1E90FF" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Wheels -->
  <circle cx="25" cy="72" r="6" fill="#333333" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="50" cy="72" r="6" fill="#333333" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="75" cy="72" r="6" fill="#333333" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Headlight -->
  <circle cx="15" cy="40" r="3" fill="#FFD700" stroke="#1a1a1a" stroke-width="1"/>
</svg>